<div id="{{ modal_id|default:'confirm-modal' }}" class="confirm-modal hidden fixed inset-0 z-50">
    <div class="confirm-modal-overlay absolute inset-0 bg-black/40"></div>
    <div class="relative mx-auto flex min-h-screen max-w-lg items-center px-4">
        <div class="dashboard-card w-full shadow-xl">
            <div class="dashboard-card-header">
                <h2 class="confirm-modal-title section-title">Confirmar acción</h2>
                <p class="confirm-modal-description mt-1 section-description"></p>
            </div>

            <form method="POST" class="confirm-modal-form">
                {% csrf_token %}
                <input type="hidden" name="estado" class="confirm-modal-estado">

                <div class="px-6 py-4">
                    <label class="confirm-modal-reason-label formulario_label mb-2 block" for="{{ modal_id|default:'confirm-modal' }}-reason">
                        Motivo
                    </label>
                    <textarea
                        id="{{ modal_id|default:'confirm-modal' }}-reason"
                        name="motivo_anulacion"
                        rows="4"
                        class="confirm-modal-reason formulario_input w-full"
                        placeholder="Escribe un motivo para dejar registro"
                    ></textarea>
                </div>

                <div class="flex justify-end gap-3 border-t px-6 py-4">
                    <button type="button" class="confirm-modal-cancel btn btn-md btn-secondary">
                        Cancelar
                    </button>
                    <button type="submit" class="confirm-modal-submit btn btn-md btn-solid-danger">
                        Confirmar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('[data-confirm-modal]').forEach((button) => {
        button.addEventListener('click', () => {
            const modal = document.getElementById(button.dataset.confirmModal);
            const form = modal.querySelector('.confirm-modal-form');
            const title = modal.querySelector('.confirm-modal-title');
            const description = modal.querySelector('.confirm-modal-description');
            const estado = modal.querySelector('.confirm-modal-estado');
            const submit = modal.querySelector('.confirm-modal-submit');
            const reason = modal.querySelector('.confirm-modal-reason');

            form.action = button.dataset.action;
            title.textContent = button.dataset.title || 'Confirmar acción';
            description.textContent = button.dataset.description || '';
            estado.value = button.dataset.estado || '';
            submit.textContent = button.dataset.confirmText || 'Confirmar';
            reason.value = '';

            modal.classList.remove('hidden');
        });
    });

    document.querySelectorAll('.confirm-modal').forEach((modal) => {
        const closeModal = () => modal.classList.add('hidden');

        modal.querySelector('.confirm-modal-cancel').addEventListener('click', closeModal);
        modal.querySelector('.confirm-modal-overlay').addEventListener('click', closeModal);
    });
</script>
