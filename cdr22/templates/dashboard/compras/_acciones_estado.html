<div class="relative inline-block text-left">
    {% if compra.estado == 'borrador' %}
        <button type="button" class="estado-menu-button btn btn-sm btn-secondary">
            Cambiar estado
        </button>
        <div class="estado-menu menu-panel">
            <div class="py-1">
                <form method="POST" action="{% url 'compras_cambiar_estado' compra.id %}">
                    {% csrf_token %}
                    <input type="hidden" name="estado" value="en_espera">
                    <button type="submit" class="menu-item text-yellow-800 hover:bg-yellow-50">
                        Pasar a espera
                    </button>
                </form>
                <form method="POST" action="{% url 'compras_cambiar_estado' compra.id %}">
                    {% csrf_token %}
                    <input type="hidden" name="estado" value="completada">
                    <button type="submit" class="menu-item text-green-800 hover:bg-green-50">
                        Completar compra
                    </button>
                </form>
                <button
                    type="button"
                    class="menu-item text-red-800 hover:bg-red-50"
                    data-confirm-modal="anular-compra-modal"
                    data-action="{% url 'compras_cambiar_estado' compra.id %}"
                    data-estado="anulada"
                    data-title="Anular compra"
                    data-description="Esta compra quedará marcada como anulada y no afectará el stock."
                    data-confirm-text="Anular compra"
                >
                    Anular compra
                </button>
            </div>
        </div>
    {% elif compra.estado == 'en_espera' %}
        <button type="button" class="estado-menu-button btn btn-sm btn-secondary">
            Cambiar estado
        </button>
        <div class="estado-menu menu-panel">
            <div class="py-1">
                <form method="POST" action="{% url 'compras_cambiar_estado' compra.id %}">
                    {% csrf_token %}
                    <input type="hidden" name="estado" value="borrador">
                    <button type="submit" class="menu-item text-gray-800 hover:bg-gray-50">
                        Volver a borrador
                    </button>
                </form>
                <form method="POST" action="{% url 'compras_cambiar_estado' compra.id %}">
                    {% csrf_token %}
                    <input type="hidden" name="estado" value="completada">
                    <button type="submit" class="menu-item text-green-800 hover:bg-green-50">
                        Completar compra
                    </button>
                </form>
                <button
                    type="button"
                    class="menu-item text-red-800 hover:bg-red-50"
                    data-confirm-modal="anular-compra-modal"
                    data-action="{% url 'compras_cambiar_estado' compra.id %}"
                    data-estado="anulada"
                    data-title="Anular compra"
                    data-description="Esta compra quedará marcada como anulada y no afectará el stock."
                    data-confirm-text="Anular compra"
                >
                    Anular compra
                </button>
            </div>
        </div>
    {% else %}
        <span class="text-sm text-gray-500">Sin acciones</span>
    {% endif %}
</div>
